<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{EMAIL_TITLE}}</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">

                    <!-- Header with Apex Logo -->
                    <tr>
                        <td style="background-color: #ffffff; padding: 30px 30px 20px 30px; text-align: center; border-bottom: 3px solid #2c5aa0;">
                            <img src="https://theapexway.net/apex-logo-full.png" alt="Apex Affinity Group" style="max-width: 300px; height: auto; margin: 0 auto; display: block;" />
                        </td>
                    </tr>

                    <!-- Main Content (injected by template) -->
                    <tr>
                        <td style="padding: 40px 30px;">
                            {{EMAIL_CONTENT}}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f9fafb; padding: 30px 30px 20px 30px; text-align: center; border-top: 1px solid #e5e7eb;">
                            <p style="color: #6b7280; font-size: 14px; line-height: 1.6; margin: 0 0 8px 0;">
                                <strong>Apex Affinity Group</strong>
                            </p>
                            <p style="color: #9ca3af; font-size: 12px; line-height: 1.6; margin: 0 0 16px 0;">
                                AI-Powered Lead Autopilot | theapexway.net
                            </p>
                            <p style="color: #9ca3af; font-size: 11px; line-height: 1.6; margin: 0 0 8px 0;">
                                1600 Highway 6 Ste 400, Sugar Land, TX 77478
                            </p>
                        </td>
                    </tr>

                    <!-- Unsubscribe Section (CAN-SPAM Compliance) -->
                    <tr>
                        <td style="background-color: #f3f4f6; padding: 20px 30px; text-align: center;">
                            <p style="color: #6b7280; font-size: 11px; line-height: 1.6; margin: 0 0 8px 0;">
                                You're receiving this email because you're a valued member of the Apex Affinity Group.
                            </p>
                            <p style="color: #9ca3af; font-size: 11px; line-height: 1.6; margin: 0;">
                                <a href="{{unsubscribe_url}}" style="color: #6b7280; text-decoration: underline;">Unsubscribe</a> |
                                <a href="https://theapexway.net/privacy" style="color: #6b7280; text-decoration: underline;">Privacy Policy</a> |
                                <a href="https://theapexway.net/contact" style="color: #6b7280; text-decoration: underline;">Contact Us</a>
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
